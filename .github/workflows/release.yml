name: CI

on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout repository (with submodules)
        uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Install dependencies
        run: brew install cmake libomp

      - name: Copy libomp
        run: |
          mkdir -p build
          cp /opt/homebrew/opt/libomp/lib/libomp.dylib ./build/libomp.dylib
          install_name_tool -id "@rpath/libomp.dylib" ./build/libomp.dylib
          codesign --force --sign - ./build/libomp.dylib

      - name: Configure libwhisper
        run: cmake -G Xcode -B libwhisper/build -S libwhisper

      - name: Compute version
        id: version_pre
        run: |
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          VERSION="${LATEST_TAG#v}"
          MAJOR=$(echo "$VERSION" | cut -d. -f1)
          MINOR=$(echo "$VERSION" | cut -d. -f2)
          PATCH=$(echo "$VERSION" | cut -d. -f3)
          NEW_PATCH=$((PATCH + 1))
          NEW_VERSION="${MAJOR}.${MINOR}.${NEW_PATCH}"
          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"

      - name: Build Wisp
        run: |
          xcodebuild -scheme Wisp -configuration Release -jobs 8 \
            -derivedDataPath build -quiet -destination 'platform=macOS,arch=arm64' \
            -skipPackagePluginValidation -skipMacroValidation \
            -UseModernBuildSystem=YES -clonedSourcePackagesDirPath SourcePackages \
            -skipUnavailableActions CODE_SIGNING_ALLOWED=NO CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            MARKETING_VERSION=${{ steps.version_pre.outputs.version }} \
            CURRENT_PROJECT_VERSION=1 build

      - name: Create DMG
        if: github.ref == 'refs/heads/master' && github.event_name == 'push'
        run: |
          hdiutil create -volname "Wisp" \
            -srcfolder build/Build/Products/Release/Wisp.app \
            -ov -format UDZO Wisp.dmg

      - name: Create version tag
        if: github.ref == 'refs/heads/master' && github.event_name == 'push'
        id: version
        run: |
          NEW_VERSION="${{ steps.version_pre.outputs.version }}"
          NEW_TAG="v${NEW_VERSION}"

          echo "New version: $NEW_VERSION (tag: $NEW_TAG)"
          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$NEW_TAG" >> "$GITHUB_OUTPUT"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$NEW_TAG" -m "Release $NEW_VERSION"
          git push origin "$NEW_TAG"

      - name: Generate SHA256
        if: github.ref == 'refs/heads/master' && github.event_name == 'push'
        id: sha256
        run: |
          SHA=$(shasum -a 256 Wisp.dmg | cut -d' ' -f1)
          echo "hash=$SHA" >> "$GITHUB_OUTPUT"
          echo "$SHA  Wisp.dmg" > Wisp.dmg.sha256

      - name: Create GitHub Release
        if: github.ref == 'refs/heads/master' && github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          files: |
            Wisp.dmg
            Wisp.dmg.sha256
          generate_release_notes: true

      - name: Update Homebrew tap
        if: github.ref == 'refs/heads/master' && github.event_name == 'push'
        env:
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          SHA="${{ steps.sha256.outputs.hash }}"

          git clone https://x-access-token:${TAP_TOKEN}@github.com/andrii-rubtsov/homebrew-tap.git /tmp/homebrew-tap
          cd /tmp/homebrew-tap

          sed -i '' "s/version \".*\"/version \"${VERSION}\"/" Casks/wisp.rb
          sed -i '' "s/sha256 \".*\"/sha256 \"${SHA}\"/" Casks/wisp.rb

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/wisp.rb
          git commit -m "Update Wisp to ${VERSION}"
          git push
